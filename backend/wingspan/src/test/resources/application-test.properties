# ─── AWS / Digital Ocean Spaces (disabled for tests – beans are mocked) ───────
spring.cloud.aws.credentials.access-key=test-access-key
spring.cloud.aws.credentials.secret-key=test-secret-key-1234567890
spring.cloud.aws.region.static=us-east-1
spring.cloud.aws.ec2.metadata.enabled=false
spring.cloud.aws.s3.endpoint=http://localhost:9999
spring.cloud.aws.endpoint=http://localhost:9999
digitalocean.bucket.name=test-bucket

# ─── JPA ─────────────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ─── Multipart: allow up to 25 MB so the service-layer 20 MB check is tested ─
spring.servlet.multipart.max-file-size=25MB
spring.servlet.multipart.max-request-size=25MB

# ─── Misc ────────────────────────────────────────────────────────────────────
spring.jpa.properties.hibernate.format_sql=false
