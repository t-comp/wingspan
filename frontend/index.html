<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <meta name="description" content="" />
    <meta name="author" content="" />
    <title>WingSpan</title>
    <!-- Favicon-->
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico" />
    <!-- Font Awesome icons (free version)-->
    <script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js" crossorigin="anonymous"></script>
    <!-- Google fonts-->
    <link href="https://fonts.googleapis.com/css?family=Montserrat:400,700" rel="stylesheet" type="text/css" />
    <link href="https://fonts.googleapis.com/css?family=Lato:400,700,400italic,700italic" rel="stylesheet"
        type="text/css" />
    <!-- Core theme CSS (includes Bootstrap)-->
    <link href="css/styles.css" rel="stylesheet" />
</head>

<body id="page-top">
    <!-- Navigation-->
    <nav class="navbar navbar-expand-lg bg-secondary text-uppercase fixed-top" id="mainNav">
        <div class="container">
            <a class="navbar-brand" href="#page-top">COMS402-Senior Design</a>
            <button class="navbar-toggler text-uppercase font-weight-bold bg-primary text-white rounded" type="button"
                data-bs-toggle="collapse" data-bs-target="#navbarResponsive" aria-controls="navbarResponsive"
                aria-expanded="false" aria-label="Toggle navigation">
                Menu
                <i class="fas fa-bars"></i>
            </button>
            <div class="collapse navbar-collapse" id="navbarResponsive">
                <ul class="navbar-nav ms-auto">
                </ul>
            </div>
        </div>
    </nav>
    <!-- Masthead-->
    <header class="masthead bg-primary text-white text-center">
        <div class="container d-flex align-items-center flex-column">
            <h1 class="masthead-heading text-uppercase mb-0">WingSpan</h1>
            <div class="divider-custom divider-light">
                <div class="divider-custom-line"></div>
                <div class="divider-custom-icon"><i class="fas fa-star"></i></div>
                <div class="divider-custom-line"></div>
            </div>
            <p class="masthead-subheading font-weight-light mb-0">Browse through our collection of butterflies!</p>
        </div>
    </header>

    <nav class="navbar navbar-light bg-light">
        <div class="container d-flex flex-row align-items-center">
            <input id="searchInput" class="form-control me-2" type="search" placeholder="Search butterflies..."
                aria-label="Search" style="flex:1;">
            <button id="filterBtn" class="btn btn-outline-secondary">Filter</button>
            <button id="uploadBtn" class="btn btn-outline-primary me-2" data-bs-toggle="modal"
                data-bs-target="#addButterflyModal">Upload</button>
        </div>
    </nav>



    <!-- Portfolio Section-->
    <section class="page-section portfolio" id="portfolio">

        <div class="container">

            <!-- Portfolio Grid Items-->
            <div class="row justify-content-center" id="butterflyGrid">
                <!-- should display info here -->
            </div>
        </div>
    </section>

    <!-- Footer-->
    <footer class="footer text-center">
        <div class="container">
            <div class="row">
                <div class="row justify-content-center align-items-center">
                    <div class="col-lg-4 mb-5 mb-lg-0 text-center">
                        <h4 class="text-uppercase mb-4">About Us</h4>
                        <p class="lead mb-0">
                            Developers: Siri, Taylor, Lexi, Abby
                            <br />
                            We are building this project for our Senior Design class!
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </footer>

    <!-- Copyright Section-->
    <div class="copyright py-4 text-center text-white">
        <div class="container"><small>Copyright &copy; Senior Design</small></div>
    </div>


    <!-- Modals for Butterfly-->
    <!-- Individual Butterfly-->
    <div class="modal fade" id="butterflyModal" tabindex="-1" aria-labelledby="butterflyModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="butterflyModalLabel">Butterfly Name</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <img id="butterflyModalImage" src="" class="img-fluid mb-3" alt="">
                    <p><strong>Scientific Name:</strong> <span id="butterflyModalScientific"></span></p>
                    <p><strong>Sex:</strong> <span id="butterflyModalSex"></span></p>
                    <p><strong>Description:</strong></p>
                    <p id="butterflyModalDescription"></p>
                    <p><strong>Tags:</strong> <span id="butterflyModalTags"></span></p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-danger" id="deleteButterflyBtn">Delete</button>
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                </div>
            </div>
        </div>
    </div>
    <!-- Butterfly Popup-->
    <div class="modal fade" id="addButterflyModal" tabindex="-1" aria-labelledby="addButterflyLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Add Butterfly</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="addButterflyForm">
                        <div class="mb-3">
                            <label class="form-label">Common Name</label>
                            <input type="text" class="form-control" id="newName" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Scientific Name</label>
                            <input type="text" class="form-control" id="newScientific">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Sex</label>
                            <select class="form-select" id="newSex">
                                <option>Male</option>
                                <option>Female</option>
                                <option>Unknown</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Description</label>
                            <textarea class="form-control" id="newDescription" rows="3"></textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Tags (comma separated)</label>
                            <input type="text" class="form-control" id="newTags">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Image URL</label>
                            <input type="text" class="form-control" id="newImage"
                                placeholder="e.g., assets/img/placeholder1.jpg">
                        </div>
                        <button type="submit" class="btn btn-primary">Add Butterfly</button>
                    </form>
                </div>
            </div>
        </div>
    </div>


    <!-- Bootstrap core JS-->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Core theme JS-->
    <script src="js/scripts.js"></script>
    <!-- * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * *-->
    <!-- * *                               SB Forms JS                               * *-->
    <!-- * * Activate your form at https://startbootstrap.com/solution/contact-forms * *-->
    <!-- * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * *-->
    <script src="https://cdn.startbootstrap.com/sb-forms-latest.js"></script>
</body>

</html>
