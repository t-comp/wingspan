<section
  class="page-section bg-light"
  id="coverageDashboard"
  style="display: none; padding-top: 100px"
>
  <div class="container-fluid px-4">
    <h2
      class="page-section-heading text-center text-uppercase text-secondary mb-0"
    >
      Image Coverage Dashboard KJ
    </h2>
    <div class="divider-custom">
      <div class="divider-custom-line"></div>
      <div class="divider-custom-icon"><i class="fas fa-table"></i></div>
      <div class="divider-custom-line"></div>
    </div>

    <div class="row justify-content-center">
      <div class="col-lg-8 col-xl-7">
        <p class="text-center text-muted">
          Paste a list of species names (one per line) to check core image
          coverage.
        </p>

        <div class="mb-3">
          <textarea
            class="form-control shadow-sm"
            id="speciesCoverageInput"
            rows="5"
            placeholder="Monarch&#10;Eastern Tiger Swallowtail..."
          ></textarea>
        </div>

        <div class="mb-4">
          <label class="form-label text-muted small fw-bold"
            >Additional Tags to Check (Optional)</label
          >
          <button
            type="button"
            class="btn btn-outline-secondary w-100 shadow-sm mb-2"
            data-bs-toggle="modal"
            data-bs-target="#coverageTagModal"
          >
            <i class="fas fa-tags me-2"></i>Select Additional Tags
          </button>
          <div
            id="coverageSelectedTagsDisplay"
            class="d-flex flex-wrap gap-2 mt-2"
          ></div>
        </div>
        <button class="btn btn-primary w-100 shadow-sm" id="checkCoverageBtn">
          <i class="fas fa-search me-2"></i>Check Coverage
        </button>
      </div>
    </div>

    <div class="row mt-5" id="coverageResultsSection" style="display: none">
      <div class="col-12 table-responsive">
        <table
          class="table table-bordered table-hover bg-white text-center align-middle"
          id="coverageTable"
        >
          <thead class="table-light" id="coverageTableHead"></thead>
          <tbody id="coverageTableBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <div
    class="modal fade"
    id="coverageTagModal"
    tabindex="-1"
    aria-hidden="true"
    style="z-index: 1070"
  >
    <div
      class="modal-dialog modal-xl modal-dialog-scrollable modal-dialog-centered"
    >
      <div class="modal-content shadow-lg border-0">
        <div class="modal-header bg-light border-bottom-0">
          <h5 class="modal-title fw-bold text-primary">
            <i class="fas fa-tags me-2"></i>Search Additional Species Tags
          </h5>
          <button
            type="button"
            class="btn-close"
            data-bs-dismiss="modal"
            aria-label="Close"
          ></button>
        </div>
        <div class="modal-body p-4 bg-light">
          <div class="input-group mb-4 shadow-sm">
            <span class="input-group-text bg-white border-end-0"
              ><i class="fas fa-search text-muted"></i
            ></span>
            <input
              type="text"
              id="coverageTagPickerSearch"
              class="form-control border-start-0"
              placeholder="Type to filter categories or tags..."
            />
          </div>

          <div
            id="coverageFullTagGrid"
            class="row row-cols-1 row-cols-md-2 row-cols-lg-3 row-cols-xl-4 g-4"
          >
            <div class="text-center text-muted w-100">
              <i class="fas fa-spinner fa-spin me-2"></i>Loading tags...
            </div>
          </div>
        </div>
        <div class="modal-footer bg-light">
          <button
            type="button"
            class="btn btn-secondary"
            data-bs-dismiss="modal"
          >
            Cancel
          </button>
          <button
            type="button"
            class="btn btn-primary px-4"
            id="saveCoverageTagsBtn"
            data-bs-dismiss="modal"
          >
            Save Selection
          </button>
        </div>
      </div>
    </div>
  </div>
</section>
