<section
  class="page-section bg-admin-custom"
  id="coverageDashboard"
  style="display: none; padding-top: 20px; padding-bottom: 20px"
>
  <div class="container-fluid px-5">
    <div class="row g-4 mb-4">
      <div class="col-md-7">
        <label class="form-label text-muted small fw-bold">Species List</label>
        <textarea
          class="form-control shadow-sm"
          id="speciesCoverageInput"
          rows="9"
          placeholder="(One species per line)&#10;e.g.&#10;Monarch&#10;Eastern Tiger Swallowtail&#10;African Caper&#10;..."
        ></textarea>
      </div>

      <div class="col-md-5 d-flex flex-column">
        <div class="d-flex justify-content-between align-items-center mb-2">
          <label class="form-label text-muted small fw-bold mb-0"
            >Additional Tags to Check</label
          >

          <div class="action-tooltip-container">
            <button
              type="button"
              class="btn btn-upload rounded-circle shadow-sm p-0 d-flex align-items-center justify-content-center"
              data-bs-toggle="modal"
              data-bs-target="#coverageTagModal"
              style="width: 38px; height: 38px"
            >
              <i class="fas fa-tags text-white"></i>
            </button>
            <span class="action-tooltip" style="bottom: -30px">Add Tags</span>
          </div>
        </div>

        <div
          id="coverageSelectedTagsDisplay"
          class="d-flex flex-wrap align-content-start gap-2 p-3 bg-white border rounded shadow-sm flex-grow-1 overflow-auto"
          style="min-height: 150px"
        >
          <span class="text-muted small italic"
            >No additional tags selected</span
          >
        </div>
      </div>
    </div>

    <div class="row mt-4">
      <div class="col-12 d-flex justify-content-center">
        <button
          class="btn btn-primary shadow-sm py-2 px-5 fw-bold fs-5 rounded-pill"
          id="checkCoverageBtn"
        >
          <i class="fas fa-search me-2"></i>Check Coverage
        </button>
      </div>
    </div>

    <div class="row mt-5" id="coverageResultsSection" style="display: none">
      <div class="col-12">
        <div class="d-flex shadow-sm bg-white rounded border">
          <div
            style="
              width: 220px;
              flex-shrink: 0;
              z-index: 10;
              box-shadow: 5px 0 8px -3px rgba(0, 0, 0, 0.1);
            "
          >
            <table class="table table-bordered table-hover m-0 align-middle">
              <thead class="table-light" id="fixedTableHead"></thead>
              <tbody id="fixedTableBody"></tbody>
            </table>
          </div>

          <div
            class="flex-grow-1"
            style="overflow-x: auto; border-left: 1px solid #dee2e6"
          >
            <table
              class="table table-bordered table-hover text-center m-0 align-middle"
              style="white-space: nowrap"
            >
              <thead class="table-light" id="scrollTableHead"></thead>
              <tbody id="scrollTableBody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div
    class="modal fade"
    id="coverageTagModal"
    tabindex="-1"
    aria-hidden="true"
    style="z-index: 1070"
  >
    <div
      class="modal-dialog modal-xl modal-dialog-scrollable modal-dialog-centered"
    >
      <div class="modal-content shadow-lg border-0">
        <div class="modal-header bg-light border-bottom-0">
          <h5 class="modal-title fw-bold text-primary">
            <i class="fas fa-tags me-2"></i>Select Species Tags
          </h5>
          <button
            type="button"
            class="btn-close"
            data-bs-dismiss="modal"
            aria-label="Close"
          ></button>
        </div>
        <div class="modal-body p-4 bg-light">
          <div class="input-group mb-4 shadow-sm">
            <span class="input-group-text bg-white border-end-0"
              ><i class="fas fa-search text-muted"></i
            ></span>
            <input
              type="text"
              id="coverageTagPickerSearch"
              class="form-control border-start-0"
              placeholder="Type to filter categories or tags..."
            />
          </div>

          <div
            id="coverageFullTagGrid"
            class="row row-cols-1 row-cols-md-2 row-cols-lg-3 row-cols-xl-4 g-4"
          >
            <div class="text-center text-muted w-100 py-5">
              <i class="fas fa-spinner fa-spin me-2"></i>Loading tags...
            </div>
          </div>
        </div>
        <div class="modal-footer bg-white border-top-0">
          <button
            type="button"
            class="btn btn-primary px-5 fw-bold rounded-pill shadow-sm"
            id="saveCoverageTagsBtn"
            data-bs-dismiss="modal"
          >
            Apply & Close
          </button>
        </div>
      </div>
    </div>
  </div>
</section>
