<div
  id="create-account-screen"
  class="justify-content-center align-items-center text-center text-white"
  style="
    min-height: 100vh;
    width: 100%;
    background: linear-gradient(180deg, #0097b2 0%, #7ed957 100%);
    display: none;
  "
>
  <div class="container d-flex flex-column align-items-center">
    <img
      src="assets/img/butterfly.png"
      alt="WingSpan Logo"
      style="width: 70px; filter: brightness(0) invert(1)"
      class="mb-3"
    />
    <h1 class="display-5 fw-bold text-uppercase mb-4">WingSpan</h1>

    <div
      class="card p-4 shadow-lg text-dark text-start mb-4"
      style="max-width: 400px; width: 100%; border-radius: 15px"
    >
      <form id="createAccountForm">
        <div class="mb-3">
          <label class="form-label text-muted small fw-bold mb-1"
            >Username</label
          >
          <input
            type="text"
            class="form-control px-3 py-2"
            id="createUsername"
            placeholder="e.g., isu58"
            style="border-radius: 6px"
            required
          />
        </div>
        <div class="mb-3">
          <label class="form-label text-muted small fw-bold mb-1"
            >Email address</label
          >
          <input
            type="email"
            class="form-control px-3 py-2"
            id="createEmail"
            placeholder="isu58@iastate.edu"
            style="border-radius: 6px"
            required
          />
        </div>
        <div class="mb-4">
          <label class="form-label text-muted small fw-bold mb-1"
            >Password</label
          >
          <input
            type="password"
            class="form-control px-3 py-2"
            id="createPassword"
            placeholder="••••••••"
            style="border-radius: 6px"
            required
          />
        </div>

        <div class="d-flex justify-content-between align-items-center pt-2">
          <button
            type="button"
            id="createBackToWelcomeBtn"
            class="btn btn-back-circle shadow-sm"
            aria-label="Back"
            onclick="window.location.href = 'welcome.html'"
          >
            <i class="fas fa-chevron-left"></i>
          </button>

          <button
            type="submit"
            class="btn btn-wingspan-primary rounded-pill fw-bold px-4 py-2"
          >
            Sign up
          </button>
        </div>
      </form>
    </div>
    <div class="text-center mt-3">
      <span class="text-white fw-medium me-1">Already have an account?</span>
      <a
        href="#"
        id="backToLoginBtn"
        class="btn-wingspan-white text-decoration-none fw-bold px-3 py-1 rounded-pill"
        onclick="
          window.location.href = 'login.html';
          return false;
        "
        >Sign in</a
      >
    </div>
  </div>
</div>
