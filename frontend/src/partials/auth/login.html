<div
  id="login-screen"
  class="justify-content-center align-items-center text-center text-white"
  style="
    min-height: 100vh;
    width: 100%;
    background: linear-gradient(180deg, #0097b2 0%, #7ed957 100%);
    display: none;
  "
>
  <div class="container d-flex flex-column align-items-center">
    <img
      src="assets/img/butterfly.png"
      alt="WingSpan Logo"
      style="width: 70px; filter: brightness(0) invert(1)"
      class="mb-3"
    />
    <h1 class="display-5 fw-bold text-uppercase mb-4">Login</h1>
    <div
      class="card p-4 shadow-lg text-dark text-start"
      style="max-width: 400px; width: 100%; border-radius: 15px"
    >
      <form id="loginForm">
        <div class="mb-3">
          <label class="form-label fw-bold">Email or Username</label>
          <input
            type="text"
            class="form-control rounded-pill px-3 py-2"
            id="loginEmail"
            required
          />
        </div>
        <div class="mb-4">
          <label class="form-label fw-bold">Password</label>
          <input
            type="password"
            class="form-control rounded-pill px-3 py-2"
            id="loginPassword"
            required
          />
        </div>
        <button
          type="submit"
          class="btn btn-lg rounded-pill fw-bold text-white w-100 mb-3"
          style="background-color: #0399b0"
        >
          Login
        </button>
        <div class="text-center">
          <button
            type="button"
            id="loginBackToWelcomeBtn"
            class="btn btn-link text-muted text-decoration-none"
          >
            &larr; Back
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
