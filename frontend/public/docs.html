<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wingspan — Developer Docs</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root {
      --sidebar-width: 250px;
      --accent: #4a7c3f;
      --accent-light: #eaf2e8;
      --border: #e5e7eb;
      --text: #1f2937;
      --text-dim: #6b7280;
      --code-bg: #f6f8fa;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      font-size: 0.92rem;
      color: var(--text);
      background: #f9fafb;
    }

    /* ── TOP NAV ── */
    .top-nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 60px;
      background: white;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 1.5rem;
      gap: 1rem;
      z-index: 100;
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.82rem;
      color: var(--text-dim);
      text-decoration: none;
      transition: color 0.15s;
    }

    .back-btn:hover { color: var(--accent); }

    .nav-divider {
      width: 1px;
      height: 20px;
      background: var(--border);
    }

    .nav-title {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text);
    }

    .nav-badge {
      margin-left: auto;
      font-family: 'Fira Code', monospace;
      font-size: 0.68rem;
      background: var(--accent-light);
      color: var(--accent);
      padding: 0.2rem 0.55rem;
      border-radius: 4px;
      font-weight: 500;
    }

    /* ── LAYOUT ── */
    .layout {
      display: flex;
      margin-top: 60px;
      min-height: calc(100vh - 60px);
    }

    /* ── SIDEBAR ── */
    .sidebar {
      width: var(--sidebar-width);
      background: white;
      border-right: 1px solid var(--border);
      position: fixed;
      top: 60px;
      bottom: 0;
      overflow-y: auto;
      padding: 1.25rem 0;
    }

    .sidebar-group {
      padding: 0 0.75rem 1rem;
    }

    .sidebar-group-label {
      font-size: 0.62rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-dim);
      padding: 0 0.5rem;
      margin-bottom: 0.35rem;
    }

    .sidebar-item {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.42rem 0.65rem;
      border-radius: 6px;
      color: var(--text-dim);
      font-size: 0.84rem;
      cursor: pointer;
      transition: all 0.15s;
      text-decoration: none;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
    }

    .sidebar-item:hover {
      background: var(--accent-light);
      color: var(--accent);
    }

    .sidebar-item.active {
      background: var(--accent-light);
      color: var(--accent);
      font-weight: 500;
    }

    .sidebar-item i {
      width: 15px;
      font-size: 0.78rem;
      flex-shrink: 0;
    }

    /* ── CONTENT ── */
    .content {
      margin-left: var(--sidebar-width);
      flex: 1;
      padding: 2.5rem 3rem;
      max-width: 820px;
    }

    /* loading state */
    .loading {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      color: var(--text-dim);
      font-size: 0.85rem;
      padding: 3rem 0;
    }

    .spinner-border-sm { width: 1rem; height: 1rem; }

    /* ── MARKDOWN RENDERED STYLES ── */
    #doc-content h1 {
      font-size: 1.6rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 0.5rem;
      padding-bottom: 0.75rem;
      border-bottom: 2px solid var(--border);
    }

    #doc-content h2 {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--text);
      margin-top: 2rem;
      margin-bottom: 0.75rem;
      padding-bottom: 0.4rem;
      border-bottom: 1px solid var(--border);
    }

    #doc-content h3 {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text);
      margin-top: 1.5rem;
      margin-bottom: 0.5rem;
    }

    #doc-content p {
      line-height: 1.75;
      color: #374151;
      margin-bottom: 0.9rem;
    }

    #doc-content ul, #doc-content ol {
      padding-left: 1.5rem;
      margin-bottom: 1rem;
    }

    #doc-content li {
      line-height: 1.75;
      margin-bottom: 0.25rem;
      color: #374151;
    }

    #doc-content code {
      font-family: 'Fira Code', monospace;
      font-size: 0.8rem;
      background: var(--code-bg);
      border: 1px solid var(--border);
      padding: 0.1rem 0.35rem;
      border-radius: 4px;
      color: #b45309;
    }

    #doc-content pre {
      background: #1e1e1e;
      border-radius: 8px;
      padding: 1.25rem;
      overflow-x: auto;
      margin: 1rem 0;
    }

    #doc-content pre code {
      font-family: 'Fira Code', monospace;
      font-size: 0.8rem;
      background: none;
      border: none;
      padding: 0;
      color: #d4d4d4;
      line-height: 1.7;
    }

    #doc-content table {
      width: 100%;
      border-collapse: collapse;
      margin: 1rem 0;
      font-size: 0.85rem;
    }

    #doc-content th {
      background: var(--code-bg);
      padding: 0.6rem 0.85rem;
      text-align: left;
      font-weight: 600;
      border: 1px solid var(--border);
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--text-dim);
    }

    #doc-content td {
      padding: 0.6rem 0.85rem;
      border: 1px solid var(--border);
      vertical-align: top;
      line-height: 1.6;
    }

    #doc-content tr:nth-child(even) td {
      background: #fafafa;
    }

    #doc-content blockquote {
      border-left: 4px solid var(--accent);
      background: var(--accent-light);
      padding: 0.85rem 1.1rem;
      border-radius: 0 6px 6px 0;
      margin: 1rem 0;
      color: #14532d;
      font-size: 0.88rem;
      line-height: 1.65;
    }

    #doc-content hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 2rem 0;
    }

    #doc-content a {
      color: var(--accent);
      text-decoration: none;
    }

    #doc-content a:hover {
      text-decoration: underline;
    }

    #doc-content strong {
      font-weight: 600;
      color: var(--text);
    }

    @media (max-width: 768px) {
      .sidebar { display: none; }
      .content { margin-left: 0; padding: 1.5rem; }
    }
  </style>
</head>
<body>

<!-- TOP NAV -->
<nav class="top-nav">
  <a href="index.html" class="back-btn">
    <i class="fas fa-chevron-left"></i> Back to Wingspan
  </a>
  <div class="nav-divider"></div>
  <span class="nav-title">Developer Documentation</span>
  <span class="nav-badge">API v1</span>
</nav>

<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-group">
      <div class="sidebar-group-label">Overview</div>
      <button class="sidebar-item active" onclick="loadDoc('01-getting-started.md', this)">
        <i class="fas fa-rocket"></i> Getting Started
      </button>
      <button class="sidebar-item" onclick="loadDoc('02-image-sizing.md', this)">
        <i class="fas fa-images"></i> Image Sizing
      </button>
    </div>
    <div class="sidebar-group">
      <div class="sidebar-group-label">Reference</div>
      <button class="sidebar-item" onclick="loadDoc('03-api-reference.md', this)">
        <i class="fas fa-code"></i> API Reference
      </button>
      <button class="sidebar-item" onclick="loadDoc('04-code-examples.md', this)">
        <i class="fas fa-terminal"></i> Code Examples
      </button>
    </div>
    <div class="sidebar-group">
      <div class="sidebar-group-label">Help</div>
      <button class="sidebar-item" onclick="loadDoc('05-faq.md', this)">
        <i class="fas fa-question-circle"></i> FAQ
      </button>
    </div>
  </aside>

  <!-- CONTENT -->
  <main class="content">
    <div id="doc-content">
      <div class="loading">
        <div class="spinner-border spinner-border-sm text-secondary" role="status"></div>
        Loading documentation...
      </div>
    </div>
  </main>

</div>

<script>
  // configure marked for clean rendering
  marked.setOptions({
    breaks: true,
    gfm: true
  });

  async function loadDoc(filename, btn) {
    // update active sidebar item
    document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
    if(btn) btn.classList.add('active');

    // show loading
    document.getElementById('doc-content').innerHTML = `
      <div class="loading">
        <div class="spinner-border spinner-border-sm text-secondary" role="status"></div>
        Loading...
      </div>
    `;

    try {
      const res = await fetch('docs/' + filename);
      if(!res.ok) throw new Error('Could not load ' + filename);
      const md = await res.text();
      document.getElementById('doc-content').innerHTML = marked.parse(md);
      window.scrollTo(0, 0);
    } catch(e) {
      document.getElementById('doc-content').innerHTML = `
        <div class="alert alert-danger mt-3">
          Could not load documentation file: ${filename}. Make sure the docs/ folder is in the same directory as this file.
        </div>
      `;
    }
  }

  // load getting started by default
  loadDoc('01-getting-started.md', document.querySelector('.sidebar-item'));
</script>

</body>
</html>
